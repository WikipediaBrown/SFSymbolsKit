<style>
@import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=JetBrains+Mono:wght@500;600&display=swap");
/* Theme-aware: dark by default; flips on DocC's body[data-color-scheme],
   including system 'auto' via the prefers-color-scheme media query so the
   header/footer never clash with the (now theme-aware) DocC content. */
#sfsk-siteheader{
  --h-bg:#0b0b0e; --h-bd:rgba(255,255,255,.09);
  --h-brand:#ececef; --h-dot:#3b9eff;
  --h-lnk:#9a9aa5; --h-lnk-hover:#ececef; --h-active:#3b9eff;
  --h-ctabd:rgba(255,255,255,.16); --h-cta-h-bd:#3b9eff; --h-cta-h-bg:rgba(59,158,255,.14);
  background:var(--h-bg);
  border-bottom:1px solid var(--h-bd);
}
body[data-color-scheme="light"] #sfsk-siteheader{
  --h-bg:#ffffff; --h-bd:rgba(0,0,0,.10);
  --h-brand:#1d1d1f; --h-dot:#0a6cff;
  --h-lnk:#6e6e78; --h-lnk-hover:#1d1d1f; --h-active:#0a6cff;
  --h-ctabd:rgba(0,0,0,.16); --h-cta-h-bd:#0a6cff; --h-cta-h-bg:rgba(10,108,255,.10);
}
@media (prefers-color-scheme:light){
  body[data-color-scheme="auto"] #sfsk-siteheader{
    --h-bg:#ffffff; --h-bd:rgba(0,0,0,.10);
    --h-brand:#1d1d1f; --h-dot:#0a6cff;
    --h-lnk:#6e6e78; --h-lnk-hover:#1d1d1f; --h-active:#0a6cff;
    --h-ctabd:rgba(0,0,0,.16); --h-cta-h-bd:#0a6cff; --h-cta-h-bg:rgba(10,108,255,.10);
  }
}
#sfsk-siteheader .in{
  max-width:1080px;margin:0 auto;padding:0 28px;height:60px;
  display:flex;align-items:center;gap:28px;box-sizing:border-box;
}
#sfsk-siteheader .brand{
  display:flex;align-items:center;gap:10px;
  font-family:"Bricolage Grotesque",ui-sans-serif,sans-serif;font-weight:800;
  font-size:17px;letter-spacing:-.02em;color:var(--h-brand);text-decoration:none;
}
#sfsk-siteheader .dot{
  width:11px;height:11px;border-radius:50%;background:var(--h-dot);
  box-shadow:0 0 0 4px rgba(59,158,255,.14);
}
#sfsk-siteheader nav{display:flex;gap:26px;margin-left:auto;align-items:center}
#sfsk-siteheader a.lnk{
  color:var(--h-lnk);font-size:13px;font-weight:500;text-decoration:none;
  text-transform:lowercase;letter-spacing:.01em;
  font-family:"JetBrains Mono",ui-monospace,monospace;
}
#sfsk-siteheader a.lnk:hover{color:var(--h-lnk-hover)}
#sfsk-siteheader a.lnk.active{color:var(--h-active)}
#sfsk-siteheader a.cta{
  color:var(--h-brand);border:1px solid var(--h-ctabd);
  padding:7px 14px;border-radius:6px;
}
#sfsk-siteheader a.cta:hover{border-color:var(--h-cta-h-bd);background:var(--h-cta-h-bg)}
#sfsk-siteheader .sfsk-toggle{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;padding:0;background:none;cursor:pointer;
  color:var(--h-lnk);border:1px solid var(--h-ctabd);border-radius:6px;
}
#sfsk-siteheader .sfsk-toggle:hover{color:var(--h-lnk-hover);border-color:var(--h-cta-h-bd)}
#sfsk-siteheader .sfsk-toggle svg{width:15px;height:15px;display:none}
#sfsk-siteheader .sfsk-toggle[data-mode="dark"] .moon{display:block}
#sfsk-siteheader .sfsk-toggle[data-mode="light"] .sun{display:block}
@media (max-width:720px){#sfsk-siteheader nav a.lnk:not(.cta){display:none}}
/* Constrain DocC's own layout to the same centered column the
   rest of the site uses, so the docs page respects the same
   margins as every other page (not full-bleed). */
.documentation-nav .nav-content{max-width:1080px!important;margin:0 auto!important;padding:0 28px!important;box-sizing:border-box}
.documentation-layout .adjustable-sidebar-width{max-width:1080px!important;margin:0 auto!important}
#app footer.footer{max-width:1080px!important;margin:0 auto!important}
</style>
<div id="sfsk-siteheader">
  <div class="in">
    <a class="brand" href="https://sfsymbolskit.com/"><span class="dot"></span>SFSymbolsKit</a>
    <nav>
      <a class="lnk" href="https://sfsymbolskit.com/#overview">overview</a>
      <a class="lnk" href="https://sfsymbolskit.com/tutorial/">tutorial</a>
      <a class="lnk" href="https://sfsymbolskit.com/symbols/">symbols</a>
      <a class="lnk" href="https://sfsymbolskit.com/blog/">blog</a>
      <a class="lnk active" href="https://sfsymbolskit.com/documentation/documentation/sfsymbolskit/">documentation</a>
      <a class="lnk" href="https://sfsymbolskit.com/#install">install</a>
      <a class="lnk cta" href="https://github.com/WikipediaBrown/SFSymbolsKit">GitHub &rarr;</a>
      <button class="sfsk-toggle" id="sfsk-toggle" type="button" aria-label="Toggle light or dark appearance" title="Toggle appearance">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </nav>
  </div>
</div>
<script>
(function(){
  /* Drive DocC's OWN color-scheme control. Faking <body data-color-scheme>
     only flips the CSS that keys directly off that attribute (text) but
     not DocC's reactive background — so we operate DocC's real radio
     instead, giving a complete switch. We also mirror the choice to the
     main site's key ('sfsk-theme') so it carries across both. */
  var SKEY="sfsk-theme", DKEY="developer.setting.preferredColorScheme";
  var btn=document.getElementById("sfsk-toggle");
  function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  function effective(){
    var a=document.body.getAttribute("data-color-scheme");
    if(a==="light"||a==="dark") return a;
    var s=lsGet(DKEY)||lsGet(SKEY);
    if(s==="light"||s==="dark") return s;
    return (window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  }
  function sync(){ btn.setAttribute("data-mode",effective()); }
  function setViaDocC(scheme){
    var fs=document.querySelector(".color-scheme-toggle");
    if(!fs) return false;
    var inp=Array.prototype.slice.call(fs.querySelectorAll("input"))
              .filter(function(i){return i.value===scheme;})[0];
    if(!inp) return false;
    inp.click();            // let DocC apply the full theme + persist
    return true;
  }
  btn.addEventListener("click",function(){
    var next=effective()==="dark"?"light":"dark";
    if(!setViaDocC(next)){              // DocC app not mounted yet: best effort
      lsSet(DKEY,next);
      document.body.setAttribute("data-color-scheme",next);
    }
    lsSet(SKEY,next);                   // bridge to the rest of the site
    sync(); setTimeout(sync,60);
  });
  // keep the icon honest if DocC's own footer control changes the scheme
  try{ new MutationObserver(sync).observe(document.body,
       {attributes:true,attributeFilter:["data-color-scheme"]}); }catch(e){}
  sync(); setTimeout(sync,60);
})();
</script>
