changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels: [enhancement, feature]
    - title: 🐛 Bug Fixes
      labels: [bug, fix]
    - title: 📦 Dependencies
      labels: [dependencies]
    - title: 📝 Documentation
      labels: [documentation]
    - title: 🔧 CI & Tooling
      labels: [ci, tooling]
    - title: 🧹 Other Changes
      labels: ["*"]
