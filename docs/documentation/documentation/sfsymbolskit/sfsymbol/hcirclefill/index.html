(function(){
  /* Drive DocC's OWN color-scheme control. Faking <body data-color-scheme>
     only flips the CSS that keys directly off that attribute (text) but
     not DocC's reactive background — so we operate DocC's real radio
     instead, giving a complete switch. We also mirror the choice to the
     main site's key ('sfsk-theme') so it carries across both. */
  var SKEY="sfsk-theme", DKEY="developer.setting.preferredColorScheme";
  var btn=document.getElementById("sfsk-toggle");
  function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  function effective(){
    var a=document.body.getAttribute("data-color-scheme");
    if(a==="light"||a==="dark") return a;
    var s=lsGet(DKEY)||lsGet(SKEY);
    if(s==="light"||s==="dark") return s;
    return (window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  }
  function sync(){ btn.setAttribute("data-mode",effective()); }
  function setViaDocC(scheme){
    var fs=document.querySelector(".color-scheme-toggle");
    if(!fs) return false;
    var inp=Array.prototype.slice.call(fs.querySelectorAll("input"))
              .filter(function(i){return i.value===scheme;})[0];
    if(!inp) return false;
    inp.click();            // let DocC apply the full theme + persist
    return true;
  }
  btn.addEventListener("click",function(){
    var next=effective()==="dark"?"light":"dark";
    if(!setViaDocC(next)){              // DocC app not mounted yet: best effort
      lsSet(DKEY,next);
      document.body.setAttribute("data-color-scheme",next);
    }
    lsSet(SKEY,next);                   // bridge to the rest of the site
    sync(); setTimeout(sync,60);
  });

  try{ new MutationObserver(sync).observe(document.body,
       {attributes:true,attributeFilter:["data-color-scheme"]}); }catch(e){}

})();
