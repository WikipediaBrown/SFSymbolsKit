<script>
(function(){
  /* Drive DocC's own color scheme so this toggle matches the rest of the
     site. DocC persists scheme in
     localStorage['developer.setting.preferredColorScheme'] and styles off
     <body data-color-scheme>. We also mirror to the main site's key
     ('sfsk-theme') so the choice carries across both. */
  var DKEY="developer.setting.preferredColorScheme", SKEY="sfsk-theme";
  function get(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  var pref=get(DKEY)||get(SKEY);
  if(pref==="light"||pref==="dark"){ document.body.setAttribute("data-color-scheme",pref); }
  function cur(){
    var a=document.body.getAttribute("data-color-scheme");
    if(a==="light"||a==="dark") return a;
    return (window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  }
  var btn=document.getElementById("sfsk-toggle");
  function sync(){ btn.setAttribute("data-mode",cur()); }
  sync();
  btn.addEventListener("click",function(){
    var next=cur()==="dark"?"light":"dark";
    document.body.setAttribute("data-color-scheme",next);
    set(DKEY,next); set(SKEY,next); sync();
  });
})();
</script>
