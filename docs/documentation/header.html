<style>
@import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=JetBrains+Mono:wght@500;600&display=swap");
#sfsk-siteheader{
  background:#0b0b0e;border-bottom:1px solid rgba(255,255,255,.09);
  font-family:"JetBrains Mono",ui-monospace,monospace;
}
#sfsk-siteheader .in{
  max-width:1080px;margin:0 auto;padding:0 28px;height:54px;
  display:flex;align-items:center;gap:26px;
}
#sfsk-siteheader .brand{
  display:flex;align-items:center;gap:9px;
  font-family:"Bricolage Grotesque",sans-serif;font-weight:800;
  font-size:16px;letter-spacing:-.02em;color:#ececef;text-decoration:none;
}
#sfsk-siteheader .dot{
  width:10px;height:10px;border-radius:50%;background:#3b9eff;
  box-shadow:0 0 0 4px rgba(59,158,255,.16);
}
#sfsk-siteheader nav{display:flex;gap:22px;margin-left:auto;align-items:center}
#sfsk-siteheader a.lnk{
  color:#9a9aa5;font-size:12.5px;font-weight:500;text-decoration:none;
  text-transform:lowercase;letter-spacing:.01em;
}
#sfsk-siteheader a.lnk:hover{color:#ececef}
#sfsk-siteheader a.lnk.active{color:#3b9eff}
#sfsk-siteheader a.cta{
  color:#ececef;border:1px solid rgba(255,255,255,.16);
  padding:6px 13px;border-radius:6px;
}
#sfsk-siteheader a.cta:hover{border-color:#3b9eff;background:rgba(59,158,255,.14)}
@media (max-width:720px){#sfsk-siteheader nav a.lnk:not(.active){display:none}}

      <a class="lnk" href="https://sfsymbolskit.com/tutorial/">tutorial</a>
      <a class="lnk" href="https://sfsymbolskit.com/blog/">blog</a>

      <a class="lnk" href="https://sfsymbolskit.com/#install">install</a>
      <a class="lnk cta" href="https://github.com/WikipediaBrown/SFSymbolsKit">GitHub →</a>
    </nav>
