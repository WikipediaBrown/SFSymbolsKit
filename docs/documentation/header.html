<style>
@import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=JetBrains+Mono:wght@500;600&display=swap");
#sfsk-siteheader{
  background:#0b0b0e;
  border-bottom:1px solid rgba(255,255,255,.09);
}
#sfsk-siteheader .in{
  width:100%;padding:0 22px;height:60px;
  display:flex;align-items:center;gap:28px;box-sizing:border-box;
}
#sfsk-siteheader .brand{
  display:flex;align-items:center;gap:10px;
  font-family:"Bricolage Grotesque",ui-sans-serif,sans-serif;font-weight:800;
  font-size:17px;letter-spacing:-.02em;color:#ececef;text-decoration:none;
}
#sfsk-siteheader .dot{
  width:11px;height:11px;border-radius:50%;background:#3b9eff;
  box-shadow:0 0 0 4px rgba(59,158,255,.14);
}
#sfsk-siteheader nav{display:flex;gap:26px;margin-left:auto;align-items:center}
#sfsk-siteheader a.lnk{
  color:#9a9aa5;font-size:13px;font-weight:500;text-decoration:none;
  text-transform:lowercase;letter-spacing:.01em;
  font-family:"JetBrains Mono",ui-monospace,monospace;
}
#sfsk-siteheader a.lnk:hover{color:#ececef}
#sfsk-siteheader a.lnk.active{color:#3b9eff}
#sfsk-siteheader a.cta{
  color:#ececef;border:1px solid rgba(255,255,255,.16);
  padding:7px 14px;border-radius:6px;
}
#sfsk-siteheader a.cta:hover{border-color:#3b9eff;background:rgba(59,158,255,.14)}
@media (max-width:720px){#sfsk-siteheader nav a.lnk:not(.cta){display:none}}

      <a class="lnk" href="https://sfsymbolskit.com/#install">install</a>
      <a class="lnk cta" href="https://github.com/WikipediaBrown/SFSymbolsKit">GitHub →</a>
