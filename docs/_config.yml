title: SFSymbolsKit
description: Apple's entire SF Symbols catalog as a strongly-typed Swift API. SwiftUI, UIKit, AppKit — autocompleted, refactor-safe, generated from the source.
url: https://sfsymbolskit.com
github_username: WikipediaBrown
lang: en_US

author:
  name: WikipediaBrown
  url: https://github.com/WikipediaBrown

# jekyll-seo-tag reads social.name + social.links for org-ish profile.
# It does NOT fall back to a top-level `image:` for og:image — that has
# to be set on each page (or via defaults below).
social:
  name: SFSymbolsKit
  links:
    - https://github.com/WikipediaBrown/SFSymbolsKit

# Optional jekyll-feed logo
logo: /assets/icon-512.png

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image:
        path: /assets/og-image.png
        width: 1200
        height: 630
        alt: "SFSymbolsKit — every SF Symbol, typed. The typed Swift API Apple's SF Symbols are missing."
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /blog/:slug/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - iOS-Coverage
  - macOS-Coverage
  - iOS-Coverage 2
  - "*.xccovarchive"
  - "*.xccovreport"
