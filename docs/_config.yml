title: SFSymbolsKit
description: Apple's entire SF Symbols catalog as a strongly-typed Swift API. SwiftUI, UIKit, AppKit — autocompleted, refactor-safe, generated from the source.
url: https://sfsymbolskit.com
github_username: WikipediaBrown
lang: en_US

author:
  name: WikipediaBrown
  url: https://github.com/WikipediaBrown

# Keys read by jekyll-seo-tag
twitter:
  card: summary_large_image
social:
  name: SFSymbolsKit
  links:
    - https://github.com/WikipediaBrown/SFSymbolsKit
image: /assets/og-image.png

# Keys read by jekyll-feed
logo: /assets/icon-512.png

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - iOS-Coverage
  - macOS-Coverage
  - iOS-Coverage 2
  - "*.xccovarchive"
  - "*.xccovreport"
